<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16b8a6" />
  <title>Bebra Bros (BB) — Территориальные представители</title>
  <style>
    :root{
      --bg:#edf8f6;
      --surface:#ffffff;
      --surface-2:#f5fbfa;
      --text:#103a39;
      --muted:#5e7b79;
      --primary:#16b8a6;
      --primary-dark:#0b7f73;
      --primary-light:#dcf7f3;
      --border:#d2ebe7;
      --shadow:0 14px 34px rgba(8,67,62,.12);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    body{min-height:100vh}

    .hero{
      background:linear-gradient(135deg,#0b7f73,#16b8a6);
      color:#fff;
      padding:24px 16px;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 4px 20px rgba(0,0,0,.12);
    }
    .hero__inner{
      max-width:1280px;
      margin:0 auto;
      display:flex;
      gap:16px;
      justify-content:space-between;
      align-items:end;
      flex-wrap:wrap;
    }
    .brand{
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      opacity:.9;
      margin-bottom:8px;
    }
    h1{
      margin:0;
      font-size:32px;
      line-height:1.1;
    }
    .hero p{
      margin:10px 0 0;
      opacity:.95;
    }
    .hero__controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      width:min(100%,560px);
    }
    .input{
      height:48px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.97);
      color:var(--text);
      border-radius:14px;
      padding:0 14px;
      outline:none;
      box-shadow:var(--shadow);
      width:100%;
      font-size:14px;
    }
    #searchInput{flex:1 1 320px}
    #regionFilter{flex:0 0 220px}

    .container{
      max-width:1280px;
      margin:0 auto;
      padding:22px 16px 40px;
    }
    .section__head{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-bottom:16px;
    }
    .section__head h2{
      margin:0;
      font-size:22px;
    }
    .muted{
      color:var(--muted);
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:16px;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 40px rgba(8,67,62,.16);
    }
    .card__avatar{
      width:100%;
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      font-size:72px;
      background:linear-gradient(135deg,#dbfaf6,#effcfb);
      border-bottom:1px solid var(--border);
      user-select:none;
    }
    .card__body{padding:14px 14px 16px}
    .card__name{
      margin:0 0 8px;
      font-size:18px;
    }
    .card__meta{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      min-height: 42px;
    }
    .tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      background:var(--primary-light);
      color:var(--primary-dark);
    }
    .tag--soft{
      background:var(--surface-2);
      color:var(--muted);
      font-weight:600;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      z-index:30;
    }
    .modal.open{display:block}
    .modal__backdrop{
      position:absolute;
      inset:0;
      background:rgba(6,24,22,.58);
      backdrop-filter:blur(4px);
    }
    .modal__dialog{
      position:relative;
      width:min(760px, calc(100% - 20px));
      max-height:min(90vh, 920px);
      overflow:auto;
      margin:18px auto;
      background:var(--surface);
      border-radius:24px;
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:20px;
    }
    .modal__close{
      position:sticky;
      top:0;
      margin-left:auto;
      display:block;
      border:0;
      width:40px;
      height:40px;
      border-radius:999px;
      background:#eff8f7;
      font-size:28px;
      line-height:1;
      color:var(--text);
      cursor:pointer;
    }

    .profile{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:18px;
      align-items:start;
    }
    .profile__avatar{
      width:100%;
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      font-size:84px;
      border-radius:22px;
      background:linear-gradient(135deg,#dbfaf6,#effcfb);
      border:1px solid var(--border);
      user-select:none;
    }
    .profile__name{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.15;
    }
    .profile__subtitle{
      margin:0 0 14px;
      color:var(--muted);
    }
    .profile__list{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap:10px;
    }
    .profile__item{
      border:1px solid var(--border);
      background:var(--surface-2);
      border-radius:16px;
      padding:12px 14px;
    }
    .profile__label{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .link{
      color:var(--primary-dark);
      text-decoration:none;
      word-break:break-word;
      font-weight:600;
    }
    .link:hover{text-decoration:underline}
    .empty{
      text-align:center;
      color:var(--muted);
      padding:28px 10px;
    }
    .footer{
      text-align:center;
      color:var(--muted);
      padding:10px 16px 24px;
      font-size:13px;
    }

    @media (max-width:720px){
      .hero{padding:18px 14px}
      h1{font-size:24px}
      .hero__controls{width:100%}
      #searchInput,#regionFilter{flex:1 1 100%}
      .section__head{
        flex-direction:column;
        align-items:flex-start;
      }
      .grid{grid-template-columns:1fr}
      .modal__dialog{
        width:calc(100% - 10px);
        margin:5px auto;
        max-height:calc(100vh - 10px);
        border-radius:20px;
        padding:16px;
      }
      .profile{grid-template-columns:1fr}
      .profile__avatar{
        max-width:220px;
        margin:0 auto;
      }
      .profile__name{font-size:24px}
    }
  </style>
</head>

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeText(str) {
      return String(str ?? "")
        .toLowerCase()
        .replaceAll("ё", "е")
        .replace(/[^\p{L}\p{N}]+/gu, " ")
        .trim();
    }

    function phoneDigits(phone) {
      return String(phone ?? "").replace(/\D/g, "");
    }

    function getAllRegions() {
      const set = new Set();
      representatives.forEach(rep => {
        (rep.regions || []).forEach(r => set.add(r));
      });
      return Array.from(set).sort((a, b) => a.localeCompare(b, "ru"));
    }

    function fillRegionFilter() {
      getAllRegions().forEach(region => {
        const option = document.createElement("option");
        option.value = region;
        option.textContent = region;
        regionFilter.appendChild(option);
      });
    }

    function matchesSearch(rep, q) {
      if (!q) return true;

      const textFields = [
        rep.fio,
        rep.short,
        rep.phone,
        phoneDigits(rep.phone),
        rep.email,
        rep.direction,
        rep.division,
        ...(rep.regions || [])
      ];

      const normalizedQuery = normalizeText(q);
      const queryDigits = q.replace(/\D/g, "");

      if (queryDigits && phoneDigits(rep.phone).includes(queryDigits)) return true;
      return haystack.includes(normalizedQuery);
    }

    function filteredData() {
      const q = searchInput.value;
      const region = regionFilter.value;

      return representatives.filter(rep => {
        const regionOk = !region || (rep.regions || []).includes(region);
        const searchOk = matchesSearch(rep, q);
        return regionOk && searchOk;
      });
    }

    function createCard(rep) {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="card__avatar">${rep.avatar || "👤"}</div>
        <div class="card__body">
          <h3 class="card__name">${escapeHtml(rep.short || rep.fio)}</h3>
          <p class="card__meta">${escapeHtml((rep.regions || []).join(", "))}</p>
          <div class="tags">
            <span class="tag">${escapeHtml(rep.direction)}</span>
            <span class="tag tag--soft">${escapeHtml(rep.division)}</span>
          </div>
        </div>
      `;

      card.addEventListener("click", () => openProfile(rep));
      return card;
    }

    function renderCards() {
      const data = filteredData();
      grid.innerHTML = "";

      if (!data.length) {
        grid.innerHTML = `<div class="empty">Ничего не найдено</div>`;
        resultCount.textContent = `Найдено: 0`;
        return;
      }

      data.forEach(rep => grid.appendChild(createCard(rep)));
      resultCount.textContent = `Найдено: ${data.length}`;
    }

    function openProfile(rep) {
      const phoneLink = rep.phone
        ? `<a class="link" href="tel:${escapeHtml(phoneDigits(rep.phone) ? rep.phone : rep.phone)}">${escapeHtml(rep.phone)}</a>`
        : `Не указан`;

      profileContent.innerHTML = `
        <div class="profile">
          <div class="profile__avatar">${rep.avatar || "👤"}</div>
          <div>
            <h2 class="profile__name">${escapeHtml(rep.fio)}</h2>
            <p class="profile__subtitle">${escapeHtml(rep.short || "")}</p>

            <ul class="profile__list">
              <li class="profile__item">
                <span class="profile__label">Телефон</span>
                ${phoneLink}
              </li>
              <li class="profile__item">
                <span class="profile__label">Email</span>
                <a class="link" href="mailto:${escapeHtml(rep.email)}">${escapeHtml(rep.email)}</a>
              </li>
              <li class="profile__item">
                <span class="profile__label">Направление</span>
                ${escapeHtml(rep.direction)}
              </li>
              <li class="profile__item">
                <span class="profile__label">Дивизион</span>
                ${escapeHtml(rep.division)}
              </li>
              <li class="profile__item">
                <span class="profile__label">Зоны ответственности</span>
                ${(rep.regions || []).map(r => `<div>${escapeHtml(r)}</div>`).join("")}
              </li>
            </ul>
          </div>
        </div>
      `;

      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    searchInput.addEventListener("input", renderCards);
    regionFilter.addEventListener("change", renderCards);
    closeModalBtn.addEventListener("click", closeModal);
    closeModalBackdrop.addEventListener("click", closeModal);

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    fillRegionFilter();
    renderCards();
  </script>
</body>
</html>
